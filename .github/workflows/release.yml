name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  DOTNET_VERSION: "8.0.x"
  KACHINA_BUILDER_URL: "https://github.com/YuehaiTeam/kachina-installer/releases/latest/download/kachina-builder.exe"

jobs:
  release:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Compute Release Metadata
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}"
          $version = $tag.TrimStart('v')

          if ($version -notmatch '^(?<major>\d+)\.(?<minor>\d+)\.(?<patch>\d+)(?:[-+].*)?$') {
            throw "Tag '$tag' must look like v1.2.3 or v1.2.3-beta.1."
          }

          $fileVersion = "$($Matches.major).$($Matches.minor).$($Matches.patch).0"
          $isPrerelease = $version.Contains('-').ToString().ToLowerInvariant()

          "APP_TAG=$tag" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "APP_VERSION=$version" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "FILE_VERSION=$fileVersion" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "IS_PRERELEASE=$isPrerelease" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "REPO_URL=https://github.com/${{ github.repository }}" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Restore
        run: dotnet restore BetterBTD.slnx

      - name: Build
        run: >
          dotnet build BetterBTD.slnx
          -c Release
          --no-restore
          /p:Platform=x64
          /p:Version=${{ env.APP_VERSION }}
          /p:InformationalVersion=${{ env.APP_VERSION }}
          /p:AssemblyVersion=${{ env.FILE_VERSION }}
          /p:FileVersion=${{ env.FILE_VERSION }}

      - name: Test
        run: dotnet test BetterBTD.slnx -c Release --no-build --verbosity normal /p:Platform=x64

      - name: Publish App
        shell: pwsh
        run: |
          dotnet publish BetterBTD\BetterBTD.csproj `
            -c Release `
            -r win-x64 `
            --self-contained false `
            -o artifacts\publish\win-x64 `
            /p:Platform=x64 `
            /p:Version=${env:APP_VERSION} `
            /p:InformationalVersion=${env:APP_VERSION} `
            /p:AssemblyVersion=${env:FILE_VERSION} `
            /p:FileVersion=${env:FILE_VERSION}

          Get-ChildItem artifacts\publish\win-x64 -File -Filter *.pdb | Remove-Item -Force

      - name: Download Kachina Builder
        shell: pwsh
        run: |
          Invoke-WebRequest -Uri $env:KACHINA_BUILDER_URL -OutFile artifacts\kachina-builder.exe

      - name: Pack Release
        shell: pwsh
        run: |
          .\Build\build-kachina.ps1 `
            -BuilderPath artifacts\kachina-builder.exe `
            -ConfigPath Build\kachina.config.json `
            -InputDir artifacts\publish\win-x64 `
            -Version $env:APP_VERSION `
            -OutputDir artifacts\Releases

      - name: Upload Release
        uses: softprops/action-gh-release@v2
        with:
          prerelease: ${{ env.IS_PRERELEASE == 'true' }}
          generate_release_notes: true
          files: |
            artifacts/Releases/BetterBTD.Install.exe
            artifacts/Releases/BetterBTD.update.exe

      - name: Upload Workflow Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: BetterBTD-${{ env.APP_VERSION }}-release
          path: artifacts/Releases
